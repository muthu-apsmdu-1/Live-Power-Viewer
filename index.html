<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APS Power Monitor - Live Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: #58a6ff; margin-bottom: 5px; }
        
        /* Status Bar with Pulse Animation */
        .status-bar { font-weight: bold; padding: 15px; margin-bottom: 20px; border-radius: 8px; background: #161b22; border: 1px solid #30363d; display: inline-block; min-width: 250px; }
        #status-dot { height: 10px; width: 10px; background-color: #3fb950; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 8px #3fb950; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #status-text { color: #3fb950; font-size: 1.1em; }
        #update-time { font-size: 0.8em; color: #8b949e; display: block; margin-top: 5px; font-weight: normal; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #58a6ff; }
        .card h3 { margin: 0; color: #8b949e; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 2.2em; font-weight: bold; margin: 10px 0; color: #3fb950; text-shadow: 0 0 10px rgba(63, 185, 80, 0.2); }
        .unit { font-size: 0.5em; color: #8b949e; margin-left: 5px; }

        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 12px; overflow: hidden; border: 1px solid #30363d; font-size: 0.9em; }
        th { background: #21262d; color: #58a6ff; padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
        td { padding: 12px; border-bottom: 1px solid #21262d; text-align: left; font-family: 'Courier New', Courier, monospace; }
        tr:nth-child(even) { background: #1c2128; }
        .hb-row { color: #8b949e !important; font-style: italic; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h1>APS Power Services</h1>
    
    <div class="status-bar">
        <span id="status-dot" class="pulse"></span>
        <span id="status-text">SYSTEM LIVE</span>
        <span id="update-time">Waiting for data...</span>
    </div>

    

    <div class="grid">
        <div class="card">
            <h3>Phase R</h3>
            <div id="vR" class="val">--<span class="unit">V</span></div>
            <div id="aR" class="val" style="font-size: 1.6em; color: #c9d1d9;">--<span class="unit">A</span></div>
        </div>
        <div class="card">
            <h3>Phase Y</h3>
            <div id="vY" class="val">--<span class="unit">V</span></div>
            <div id="aY" class="val" style="font-size: 1.6em; color: #c9d1d9;">--<span class="unit">A</span></div>
        </div>
        <div class="card">
            <h3>Phase B</h3>
            <div id="vB" class="val">--<span class="unit">V</span></div>
            <div id="aB" class="val" style="font-size: 1.6em; color: #c9d1d9;">--<span class="unit">A</span></div>
        </div>
    </div>

    <h3>Event Log (Newest at Top)</h3>
    <table>
        <thead>
            <tr>
                <th>Slot</th>
                <th>Readings (V1,V2,V3, A1,A2,A3) - Full Timestamp</th>
            </tr>
        </thead>
        <tbody id="event-log">
        </tbody>
    </table>
</div>

<script>
    const FB_URL = "https://live-power-viewer-default-rtdb.asia-southeast1.firebasedatabase.app/.json";

    async function updateDashboard() {
        try {
            const response = await fetch(FB_URL);
            const data = await response.json();
            const events = data.Events;
            
            // 1. Update Top Cards
            const latestStr = events["00_Latest"];
            const [vPart, aTsPart] = latestStr.split(' - ');
            const v = vPart.split(', ');
            const a = aTsPart.split(', ');

            document.getElementById('vR').innerHTML = `${v[0]}<span class="unit">V</span>`;
            document.getElementById('vY').innerHTML = `${v[1]}<span class="unit">V</span>`;
            document.getElementById('vB').innerHTML = `${v[2]}<span class="unit">V</span>`;
            
            document.getElementById('aR').innerHTML = `${a[0]}<span class="unit">A</span>`;
            document.getElementById('aY').innerHTML = `${a[1]}<span class="unit">A</span>`;
            document.getElementById('aB').innerHTML = `${a[2].split(' ')[0]}<span class="unit">A</span>`;

            // 2. Update Status & Timestamp
            const fullTs = aTsPart.includes(' - ') ? aTsPart.split(' - ')[1] : latestStr.split(' - ')[1];
            document.getElementById('update-time').innerText = "Last Update: " + fullTs;

            // 3. Offline Check
            const parts = fullTs.split(':'); 
            const lastDate = new Date(parts[0], parts[1]-1, parts[2], parts[3], parts[4], parts[5]);
            const diff = (new Date() - lastDate) / 1000 / 60;

            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            
            if (diff > 11) {
                dot.style.backgroundColor = "red";
                dot.style.boxShadow = "0 0 8px red";
                dot.classList.remove('pulse');
                txt.innerText = "OFFLINE";
                txt.style.color = "red";
            } else {
                dot.style.backgroundColor = "#3fb950";
                dot.style.boxShadow = "0 0 8px #3fb950";
                dot.classList.add('pulse');
                txt.innerText = "SYSTEM LIVE";
                txt.style.color = "#3fb950";
            }

            // 4. Reverse Sort Table
            const logBody = document.getElementById('event-log');
            let content = "";
            const keys = Object.keys(events).filter(k => k.startsWith('E_')).sort().reverse();
            
            keys.forEach(key => {
                const val = events[key];
                const isHB = val.includes("(HB)");
                content += `<tr class="${isHB ? 'hb-row' : ''}">
                    <td><strong>${key.replace('E_','')}</strong></td>
                    <td>${val}</td>
                </tr>`;
            });
            logBody.innerHTML = content;

        } catch (e) { console.error("Update failed", e); }
    }

    setInterval(updateDashboard, 5000); // 5 second refresh for snappy UI
    updateDashboard();
</script>

</body>
</html>
