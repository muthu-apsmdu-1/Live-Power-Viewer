<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APS Power Monitor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        
        /* 1. Heading - Golden Yellow */
        h1 { color: #FFD700; font-size: 1.5em; margin-bottom: 5px; font-weight: normal; letter-spacing: 1px; }
        
        /* 2. D_Time Row - Neon Green */
        .time-box { background: #161b22; color: #2ecc71; font-family: monospace; font-size: 1.5em; padding: 8px 25px; border-radius: 4px; display: inline-block; margin-bottom: 25px; border: 1px solid #30363d; }
        
        /* Status Indicator */
        #status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Phase Rows */
        .phase-row { display: flex; align-items: center; justify-content: space-between; background: #1c2128; margin-bottom: 15px; border-radius: 12px; padding: 18px 25px; position: relative; overflow: hidden; border: 1px solid #30363d; }
        .phase-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 10px; }
        
        /* Specific Phase Colors */
        .phase-r::before { background: #e74c3c; } /* Red */
        .phase-y::before { background: #ECE115; } /* Signal Yellow */
        .phase-b::before { background: #3498db; } /* Blue */
        
        .phase-label { font-weight: bold; font-size: 1.2em; letter-spacing: 1px; }
        .phase-r .phase-label { color: #e74c3c; }
        .phase-y .phase-label { color: #ECE115; } /* Signal Yellow */
        .phase-b .phase-label { color: #3498db; }

        .readings { display: flex; align-items: baseline; gap: 20px; }
        .val { font-size: 1.6em; font-weight: bold; color: white; }
        .unit { font-size: 0.6em; color: #8b949e; margin-left: 3px; font-weight: normal; }

        /* 3. Event Data next to Phase B (Bottom Section) */
        .log-section { margin-top: 35px; border-top: 1px solid #30363d; padding-top: 20px; }
        .log-header { font-size: 0.8em; color: #8b949e; margin-bottom: 12px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; background: #161b22; border-radius: 8px; overflow: hidden; }
        td { padding: 12px; border-bottom: 1px solid #21262d; text-align: left; font-family: monospace; }
        .slot { color: #58a6ff; font-weight: bold; width: 45px; }
    </style>
</head>
<body>

<div class="container">
    <h1>APS Power Monitor</h1>
    
    <div id="status-area">
        <span id="status-dot"></span>
        <div class="time-box" id="live-time">00:00:00</div>
    </div>

    <div class="phase-row phase-r">
        <span class="phase-label">PHASE R</span>
        <div class="readings">
            <div><span class="val" id="vR">--</span><span class="unit">V</span></div>
            <div><span class="val" id="aR">--</span><span class="unit">A</span></div>
        </div>
    </div>

    <div class="phase-row phase-y">
        <span class="phase-label">PHASE Y</span>
        <div class="readings">
            <div><span class="val" id="vY">--</span><span class="unit">V</span></div>
            <div><span class="val" id="aY">--</span><span class="unit">A</span></div>
        </div>
    </div>

    <div class="phase-row phase-b">
        <span class="phase-label">PHASE B</span>
        <div class="readings">
            <div><span class="val" id="vB">--</span><span class="unit">V</span></div>
            <div><span class="val" id="aB">--</span><span class="unit">A</span></div>
        </div>
    </div>

    <div class="log-section">
        <div class="log-header">Recent Events</div>
        <table>
            <tbody id="event-log">
                <tr><td colspan="2" style="text-align:center; color:#8b949e;">Waiting for MCU...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const FB_URL = "https://live-power-viewer-default-rtdb.asia-southeast1.firebasedatabase.app/.json";

    async function updateDashboard() {
        try {
            const response = await fetch(FB_URL);
            const data = await response.json();
            const events = data.Events;
            
            // 1. Time Update (D_Time)
            const dTime = events["D_Time"]; // "2026:02:26, 21:26:30"
            const timeOnly = dTime.split(', ')[1];
            document.getElementById('live-time').innerText = timeOnly;

            // 2. Connectivity Pulse
            const dateParts = dTime.split(', ')[0].split(':');
            const timeParts = timeOnly.split(':');
            const lastUpdate = new Date(dateParts[0], dateParts[1]-1, dateParts[2], timeParts[0], timeParts[1], timeParts[2]);
            const diffMin = (new Date() - lastUpdate) / 1000 / 60;
            
            const dot = document.getElementById('status-dot');
            if (diffMin > 2 || isNaN(diffMin)) {
                dot.style.backgroundColor = "#e74c3c"; // Red
                dot.classList.remove('pulse');
            } else {
                dot.style.backgroundColor = "#2ecc71"; // Green
                dot.classList.add('pulse');
            }

            // 3. Phase Readings (A, B, C)
            const r = events["A_Phase R"].split(', ');
            const y = events["B_Phase Y"].split(', ');
            const b = events["C_Phase B"].split(', ');

            document.getElementById('vR').innerText = r[0];
            document.getElementById('aR').innerText = r[1];
            document.getElementById('vY').innerText = y[0];
            document.getElementById('aY').innerText = y[1];
            document.getElementById('vB').innerText = b[0];
            document.getElementById('aB').innerText = b[1];

            // 4. Event History (E_XXX)
            const logBody = document.getElementById('event-log');
            let tableHTML = "";
            const keys = Object.keys(events).filter(k => k.startsWith('E_')).sort(); 
            
            keys.forEach(k => {
                tableHTML += `<tr>
                    <td class="slot">${k.split('_')[1]}</td>
                    <td>${events[k]}</td>
                </tr>`;
            });
            logBody.innerHTML = tableHTML;

        } catch (e) { console.error("Sync Error:", e); }
    }

    setInterval(updateDashboard, 5000);
    updateDashboard();
</script>
</body>
</html>
